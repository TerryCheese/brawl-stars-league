```html
<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>荒野亂鬥 互動聯賽</title>
    <style>
        :root { 
            --bg-color: #1a1b26; 
            --card-bg: #24283b; 
            --text-main: #c0caf5; 
            --text-title: #ff9e64; 
            --border-color: #414868; 
            --brawl-ball: #7aa2f7; 
            --gem-grab: #bb9af7;
            --bounty: #f7768e;
        }
        body { font-family: 'Microsoft JhengHei', 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        h1 { color: var(--text-title); text-align: center; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); margin-bottom: 10px; }
        
        .instructions { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 8px; margin-bottom: 20px; text-align: center; font-size: 0.95em; line-height: 1.6; max-width: 800px; width: 100%; }
        
        /* 地圖池展示區 */
        .map-pool-reference { background: rgba(0,0,0,0.3); padding: 15px; border-radius: 8px; margin-bottom: 30px; width: 100%; max-width: 800px; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; border: 1px solid var(--border-color); }
        .pool-title { font-weight: bold; margin-bottom: 8px; display: block; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 5px; }
        .pool-item { font-size: 0.9em; color: #fff; margin: 3px 0; }

        .matches-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; width: 100%; max-width: 1200px; }
        .match-card { background-color: var(--card-bg); border: 2px solid var(--border-color); border-radius: 12px; padding: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); transition: 0.3s; }
        .match-card:hover { border-color: var(--text-title); }
        .match-title { text-align: center; font-weight: bold; font-size: 1.1em; margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px solid var(--border-color); color: var(--text-title); }
        
        .teams { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; font-size: 1.2em; font-weight: bold; color: white; }
        .team { flex: 1; text-align: center; word-break: break-all; }
        .vs { color: var(--text-title); margin: 0 10px; font-size: 0.8em; opacity: 0.8; }
        
        .maps { display: flex; flex-direction: column; gap: 8px; }
        .map-item { display: flex; justify-content: space-between; background: rgba(0,0,0,0.2); padding: 10px 15px; border-radius: 6px; align-items: center; }
        .mode-label { font-weight: bold; font-size: 0.9em; }
        .mode-bb { color: var(--brawl-ball); }
        .mode-gg { color: var(--gem-grab); }
        .mode-bt { color: var(--bounty); }
        .map-name { color: #fff; font-size: 1.05em; font-weight: 500; }
        .map-self-pick { color: #9aa5ce; font-size: 0.9em; font-style: italic; }
        .tbd-msg { text-align:center; color:#888; font-style: italic; padding: 10px; }
    </style>
</head>
<body>

    <h1>🌟 荒野亂鬥 互動聯賽 🌟</h1>
    
    <div class="instructions">
        🏆 <b>本屆賽事對戰規則</b> 🏆<br>
        對戰採 <b>三戰兩勝制 (BO3)</b>。雙方隊伍將依序進行「足球」、「寶石」與「搶星」三個模式。<br>
        每局單一模式皆採「<b>星光戰</b>」賽制。<br>
        <b>第 1 局 (足球) 由系統隨機抽圖，第 2 局與第 3 局由雙方自行從圖池中選圖。</b>
    </div>

    <div class="map-pool-reference">
        <div>
            <span class="pool-title" style="color: var(--brawl-ball);">⚽ 足球地圖池</span>
            <div class="pool-item">· 夢幻彈珠</div>
            <div class="pool-item">· 中心舞台</div>
            <div class="pool-item">· 三重威脅</div>
        </div>
        <div>
            <span class="pool-title" style="color: var(--gem-grab);">💎 寶石地圖池</span>
            <div class="pool-item">· 咻咻作響</div>
            <div class="pool-item">· 寶石要塞</div>
            <div class="pool-item">· 地下礦坑</div>
        </div>
        <div>
            <span class="pool-title" style="color: var(--bounty);">⭐ 搶星地圖池</span>
            <div class="pool-item">· 草叢迷蹤</div>
            <div class="pool-item">· 酷熱地帶</div>
            <div class="pool-item">· 神秘流星</div>
        </div>
    </div>

    <div class="matches-container" id="matchesContainer"></div>

    <script>
        // 【主辦方控制台】修改這個數字可以重新洗牌第一局的地圖
        const leagueSeed = 1; 

        // 足球排位賽圖池 (首局隨機抽取範圍)
        const bbPool = ["夢幻彈珠", "中心舞台", "三重威脅"];

        // 【主辦方賽程表】晉級名單已更新
        const bracket = [
            // 16強
            { id: "16強賽 - M1", t1: "CrazyGooner67", t2: "I love CPP 2024" },
            { id: "16強賽 - M2", t1: "要不要打葛洛母", t2: "大咪偷練" },
            { id: "16強賽 - M3", t1: "電機小菜雞", t2: "鹽糖鹽糖秋雨風" },
            { id: "16強賽 - M4", t1: "徐東準", t2: "啊啊啊啊啊啊啊啊" },
            { id: "16強賽 - M5", t1: "0", t2: "倒讚幫" },
            { id: "16強賽 - M6", t1: "恩睿榜一大哥", t2: "八舍137" },
            { id: "16強賽 - M7", t1: "稟恩微女友", t2: "對乙醯氨基酚" },
            { id: "16強賽 - M8", t1: "庫里就是屌", t2: "輪空 (BYE)" },
            
            // 8強
            { id: "8強賽 - M1", t1: "CrazyGooner67", t2: "大咪偷練" },
            { id: "8強賽 - M2", t1: "電機小菜雞", t2: "徐東準" },
            { id: "8強賽 - M3", t1: "倒讚幫", t2: "恩睿榜一大哥" },
            { id: "8強賽 - M4", t1: "對乙醯氨基酚", t2: "庫里就是屌" },
            
            // 準決賽
            { id: "準決賽 - M1", t1: "TBD", t2: "TBD" },
            { id: "準決賽 - M2", t1: "TBD", t2: "TBD" }
        ];

        // 雜湊函數：根據文字產生固定的隨機數字
        function seededRandom(seedStr) {
            let hash = 0;
            for (let i = 0; i < seedStr.length; i++) {
                hash = Math.imul(31, hash) + seedStr.charCodeAt(i) | 0;
            }
            let t = hash += 0x6D2B79F5;
            t = Math.imul(t ^ t >>> 15, t | 1);
            t ^= t + Math.imul(t ^ t >>> 7, t | 61);
            return ((t ^ t >>> 14) >>> 0) / 4294967296;
        }

        // 從陣列中根據 seed 穩定選出一個地圖
        function getMapFromSeed(modeArray, seedValue) {
            const index = Math.floor(seededRandom(seedValue) * modeArray.length);
            return modeArray[index];
        }

        function renderBracket() {
            const container = document.getElementById('matchesContainer');
            container.innerHTML = '';

            bracket.forEach(match => {
                let mapHTML = '';
                
                if (match.t1 === "TBD" || match.t2 === "TBD") {
                    mapHTML = `<div class="tbd-msg">等待隊伍晉級後，自動解鎖地圖</div>`;
                } else if (match.t2.includes("BYE") || match.t1.includes("BYE")) {
                    mapHTML = `<div style="text-align:center; color:#ff9e64; padding: 10px;">此局直接晉級，無需比賽</div>`;
                } else {
                    const matchSeedStr = match.id + match.t1 + match.t2 + leagueSeed;
                    mapHTML = `
                        <div class="map-item">
                            <span class="mode-label mode-bb">⚽ 第1局 (足球)</span>
                            <span class="map-name">${getMapFromSeed(bbPool, matchSeedStr)}</span>
                        </div>
                        <div class="map-item">
                            <span class="mode-label mode-gg">💎 第2局 (寶石)</span>
                            <span class="map-self-pick">(從圖池自行選圖)</span>
                        </div>
                        <div class="map-item">
                            <span class="mode-label mode-bt">⭐ 第3局 (搶星)</span>
                            <span class="map-self-pick">(從圖池自行選圖)</span>
                        </div>
                    `;
                }

                const card = document.createElement('div');
                card.className = 'match-card';
                card.innerHTML = `
                    <div class="match-title">${match.id}</div>
                    <div class="teams">
                        <div class="team">${match.t1}</div>
                        <div class="vs">VS</div>
                        <div class="team">${match.t2}</div>
                    </div>
                    <div class="maps">
                        ${mapHTML}
                    </div>
                `;
                container.appendChild(card);
            });
        }

        window.onload = renderBracket;
    </script>
</body>
</html>
